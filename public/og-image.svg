  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#noise)"/>

  <g transform="translate(90,145)">
    <text x="0" y="0" fill="#E1FFA0" font-size="28" font-family="Noto Sans, Arial, sans-serif" font-weight="700" letter-spacing="2">CHIVELY HELP CENTER</text>
    <text x="0" y="112" fill="#FCFEFD" font-size="76" font-family="Noto Sans, Arial, sans-serif" font-weight="700">Support for Modern</text>
    <text x="0" y="198" fill="#FCFEFD" font-size="76" font-family="Noto Sans, Arial, sans-serif" font-weight="700">Restaurant Operations</text>
    <text x="0" y="268" fill="rgba(252,254,253,0.72)" font-size="34" font-family="Noto Sans, Arial, sans-serif">Guides, troubleshooting, and hardware setup documentation.</text>
    <text x="0" y="340" fill="#E1FFA0" font-size="30" font-family="Noto Sans, Arial, sans-serif" font-weight="700">chively.com</text>
  </g>
